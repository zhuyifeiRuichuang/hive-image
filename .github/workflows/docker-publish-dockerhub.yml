name: Build and publish to Docker Hub

# 触发：push 到 main、打 v* 标签或手动触发
on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

# 最小化权限：不需要 packages 权限（Docker Hub 使用 secrets），但 contents: read 够用
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: apachehive
      TAG_DEV1: dev1
      TAG_DEV2: dev2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 生成 OWNER_LOWER（优先使用 DOCKERHUB_USERNAME，如果没有则用 repo owner）
      - name: Prepare metadata (lowercase owner, short sha)
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            OWNER="${{ secrets.DOCKERHUB_USERNAME }}"
          else
            OWNER="${{ github.repository_owner }}"
          fi
          echo "OWNER_LOWER=$(echo \"$OWNER\" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # QEMU + Buildx (v4) 支持 multi-arch
      - name: Set up QEMU (for multi-arch emulation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          install: true
          driver: docker-container

      # 登录 Docker Hub：必须设置 DOCKERHUB_USERNAME & DOCKERHUB_PASSWORD (建议用 token)
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # 可选：验证登录状态（便于调试用户名/密码问题）
      - name: Verify Docker login (debug)
        run: |
          echo "Docker login info:"
          docker info >/dev/null || true
          # 输出当前 docker login config（仅少量信息，避免泄露 secret）
          docker --version

      # Build + push ubuntu22 -> dev1
      - name: Build and push (ubuntu22 -> dev1)
        id: build_ubuntu22
        uses: docker/build-push-action@v4
        with:
          context: ./v3
          file: ./v3/Dockerfile.ubuntu22
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            docker.io/${{ env.OWNER_LOWER }}/${{ env.IMAGE_NAME }}:${{ env.TAG_DEV1 }}
          #   docker.io/${{ env.OWNER_LOWER }}/${{ env.IMAGE_NAME }}:${{ env.TAG_DEV1 }}-${{ env.SHORT_SHA }}
          cache-from: type=registry,ref=docker.io/${{ env.OWNER_LOWER }}/${{ env.IMAGE_NAME }}:cache-ubuntu22
          cache-to: type=registry,ref=docker.io/${{ env.OWNER_LOWER }}/${{ env.IMAGE_NAME }}:cache-ubuntu22,mode=max

      # Build + push ubuntu25 -> dev2
      - name: Build and push (ubuntu25 -> dev2)
        id: build_ubuntu25
        uses: docker/build-push-action@v4
        with:
          context: ./v3
          file: ./v3/Dockerfile.ubuntu25
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            docker.io/${{ env.OWNER_LOWER }}/${{ env.IMAGE_NAME }}:${{ env.TAG_DEV2 }}
          #   docker.io/${{ env.OWNER_LOWER }}/${{ env.IMAGE_NAME }}:${{ env.TAG_DEV2 }}-${{ env.SHORT_SHA }}
          cache-from: type=registry,ref=docker.io/${{ env.OWNER_LOWER }}/${{ env.IMAGE_NAME }}:cache-ubuntu25
          cache-to: type=registry,ref=docker.io/${{ env.OWNER_LOWER }}/${{ env.IMAGE_NAME }}:cache-ubuntu25,mode=max

      # 输出推送的 tag（便于后续检查）
      - name: Post-check (log pushed tags)
        run: |
          echo "pushed tags:"
          echo "  docker.io/${OWNER_LOWER}/${IMAGE_NAME}:${TAG_DEV1}"
          # echo "  docker.io/${OWNER_LOWER}/${IMAGE_NAME}:${TAG_DEV1}-${SHORT_SHA}"
          echo "  docker.io/${OWNER_LOWER}/${IMAGE_NAME}:${TAG_DEV2}"
          # echo "  docker.io/${OWNER_LOWER}/${IMAGE_NAME}:${TAG_DEV2}-${SHORT_SHA}"
